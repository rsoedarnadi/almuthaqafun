<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Muthaqafun — مريم</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0b08;
      color: #f0e6d0;
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: rgba(0,0,0,0.6);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      flex-wrap: wrap;
      direction: ltr;
    }
    #topbar h1 { font-size: 15px; font-weight: 600; color: #F5C85A; margin-right: 8px; white-space: nowrap; }

    #phase-label {
      font-size: 11px; color: rgba(255,255,255,0.35);
      border-left: 1px solid rgba(255,255,255,0.12);
      padding-left: 10px; white-space: nowrap;
    }
    #phase-label span { color: #F5C85A; }

    /* Progress — 3 completable scenes + journey_complete */
    #progress-dots { display: flex; gap: 6px; align-items: center; }
    .pdot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s; cursor: default;
    }
    .pdot.done    { background: #70c8a0; border-color: #70c8a0; }
    .pdot.current { background: #F5C85A; border-color: #F5C85A; box-shadow: 0 0 6px #F5C85A88; }
    .pdot-label   { font-size: 10px; color: rgba(255,255,255,0.25); }

    #config { display: flex; gap: 8px; align-items: center; margin-left: auto; direction: ltr; }
    #config label { font-size: 11px; color: rgba(255,255,255,0.3); white-space: nowrap; }
    #config input {
      width: 150px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
      padding: 5px 8px; color: #f0e6d0; font-size: 11px; outline: none;
    }
    #tts-toggle {
      font-size: 11px; padding: 5px 10px; border-radius: 6px;
      background: rgba(112,200,160,0.15); border: 1px solid rgba(112,200,160,0.4);
      color: #70c8a0; cursor: pointer; white-space: nowrap;
    }
    #tts-toggle.off { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }

    #temp-scene-btn {
      font-size: 11px; padding: 5px 10px; border-radius: 6px;
      background: rgba(245,200,90,0.14); border: 1px solid rgba(245,200,90,0.35);
      color: #F5C85A; cursor: pointer; white-space: nowrap;
    }
    #temp-scene-btn:hover { background: rgba(245,200,90,0.22); }
    #temp-scene-btn:disabled {
      background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.28); cursor: not-allowed;
    }

    /* ── 3D canvas ── */
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    #canvas-wrap canvas { display: block; width: 100% !important; height: 100% !important; }

    #scene-label { position: absolute; top: 14px; left: 16px; pointer-events: none; direction: ltr; }
    #scene-label .en { font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.85); }
    #scene-label .ar { font-size: 14px; color: rgba(255,255,255,0.4); direction: rtl; margin-top: 2px; }

    #controls-hint {
      position: absolute; bottom: 14px; right: 16px;
      font-size: 10px; color: rgba(255,255,255,0.2);
      pointer-events: none; line-height: 1.8; text-align: right; direction: ltr;
    }
    #status-bar {
      position: absolute; bottom: 14px; left: 16px;
      font-size: 10px; color: rgba(255,255,255,0.2);
      pointer-events: none; direction: ltr;
    }
    #loading-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.65); display: none;
      align-items: center; justify-content: center;
      font-size: 14px; color: #F5C85A;
    }
    #audio-indicator {
      position: absolute; top: 14px; right: 16px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #70c8a0; display: none; animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Maryam speech bubble ── */
    #maryam-bubble {
      position: absolute; bottom: 90px; left: 50%;
      transform: translateX(-50%);
      max-width: min(580px, 88vw); width: max-content;
      background: rgba(8,6,3,0.9);
      border: 1px solid rgba(245,200,90,0.3);
      border-radius: 14px; padding: 14px 18px 12px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      pointer-events: none; opacity: 0;
      transition: opacity 0.3s ease;
      direction: rtl; text-align: right;
    }
    #maryam-bubble.visible { opacity: 1; pointer-events: auto; }
    #maryam-bubble .bubble-sender {
      font-size: 11px; font-weight: 600; color: #aad4ff;
      letter-spacing: 0.04em; margin-bottom: 6px; opacity: 0.7;
    }
    #maryam-bubble .bubble-text { font-size: 15px; line-height: 1.65; color: #f0e6d0; }
    .dots span {
      display: inline-block; width: 6px; height: 6px;
      background: #F5C85A; border-radius: 50%; margin: 0 2px;
      animation: dot-bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* ── Object checklist (top-right) ── */
    #obj-checklist {
      position: absolute; top: 14px; right: 14px;
      background: rgba(8,6,3,0.78);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 10px 12px; min-width: 190px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      direction: rtl;
    }
    #obj-checklist.hidden { display: none; }
    #obj-checklist .cl-title {
      font-size: 10px; color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px;
    }
    .cl-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: rgba(255,255,255,0.45);
      margin-bottom: 5px; transition: color 0.3s; direction: rtl;
    }
    .cl-item.done { color: #70c8a0; }
    .cl-check {
      width: 14px; height: 14px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; flex-shrink: 0; transition: all 0.3s;
    }
    .cl-item.done .cl-check { background: #70c8a0; border-color: #70c8a0; color: #0d0b08; }

    /* ── JSON Tool Panel (bottom-right) ── */
    #tool-panel {
      position: absolute; bottom: 90px; right: 14px;
      width: 270px; max-width: 42vw;
      background: rgba(5,4,2,0.92);
      border: 1px solid rgba(245,200,90,0.15);
      border-radius: 10px; overflow: hidden;
      direction: ltr; font-family: 'Courier New', monospace;
      transition: opacity 0.3s; opacity: 0;
    }
    #tool-panel.visible { opacity: 1; }
    #tool-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px;
      background: rgba(245,200,90,0.07);
      border-bottom: 1px solid rgba(245,200,90,0.1);
    }
    #tool-panel-header span { font-size: 10px; color: rgba(245,200,90,0.6); letter-spacing: 0.06em; text-transform: uppercase; }
    #tool-panel-close { cursor: pointer; font-size: 12px; color: rgba(255,255,255,0.3); background: none; border: none; line-height: 1; padding: 0; }
    #tool-panel-close:hover { color: rgba(255,255,255,0.7); }
    #tool-panel-body {
      padding: 8px 10px; max-height: 220px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: rgba(245,200,90,0.2) transparent;
    }
    .tool-entry { margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 8px; }
    .tool-entry:last-child { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }
    .tool-ts { font-size: 9px; color: rgba(255,255,255,0.2); margin-bottom: 3px; }
    .tool-name { font-size: 11px; color: #F5C85A; margin-bottom: 3px; }
    .tool-name::before { content: '▶ '; font-size: 9px; opacity: 0.6; }
    .tool-json {
      font-size: 10px; color: rgba(255,255,255,0.4);
      white-space: pre-wrap; word-break: break-all;
      line-height: 1.5; padding-left: 10px;
      border-left: 1px solid rgba(245,200,90,0.15);
    }
    .tool-json .jkey  { color: #aad4ff; }
    .tool-json .jstr  { color: #c8e6a0; }
    .tool-json .jnum  { color: #ffb86c; }
    .tool-json .jbool { color: #ff79c6; }

    /* ── Bottom HUD ── */
    #hud {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px; direction: ltr;
    }
    #mic-btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(20,16,10,0.8);
      color: #f0e6d0; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    #mic-btn:hover  { background: rgba(40,30,15,0.9); border-color: rgba(255,255,255,0.35); }
    #mic-btn.active { background: rgba(180,40,40,0.45); border-color: rgba(220,80,80,0.75); }

    #keyboard-toggle {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(20,16,10,0.7);
      color: rgba(255,255,255,0.45); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    #keyboard-toggle:hover  { background: rgba(40,30,15,0.9); color: #f0e6d0; }
    #keyboard-toggle.active { border-color: rgba(245,200,90,0.5); color: #F5C85A; }

    /* ── Input drawer ── */
    #input-drawer {
      position: absolute; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      width: min(520px, 92vw);
      background: rgba(8,6,3,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 12px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; gap: 8px; direction: rtl;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #input-drawer.open { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }

    #text-input {
      flex: 1; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 10px 14px;
      color: #f0e6d0; font-size: 14px; direction: rtl;
      outline: none; font-family: inherit;
    }
    #text-input:focus { border-color: rgba(245,200,90,0.4); }
    #text-input::placeholder { color: rgba(255,255,255,0.22); }

    #send-btn {
      padding: 10px 16px; border-radius: 8px; border: none;
      background: #B47A2E; color: #fff; cursor: pointer;
      font-size: 13px; font-weight: 600; transition: background 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    #send-btn:hover    { background: #c98c38; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #mic-status {
      position: absolute; bottom: 80px; left: 50%;
      transform: translateX(-50%);
      font-size: 12px; color: rgba(255,255,255,0.3);
      white-space: nowrap; pointer-events: none; direction: ltr;
    }
    #mic-status.listening { color: #e07070; }
    #mic-status.thinking  { color: #F5C85A; }
    #mic-status.speaking  { color: #70c8a0; }

    @keyframes badge-in  { from{opacity:0;transform:translateX(-50%) translateY(-12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes badge-out { from{opacity:1} to{opacity:0} }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <h1>🕌 Al Muthaqafun · المثقفون</h1>
  <div id="phase-label">Phase: <span id="phase-text">majlis_intro</span></div>
  <!-- 3 completable scenes: majlis, masjid, zubarah -->
  <div id="progress-dots">
    <span class="pdot-label">المجلس</span>
    <div class="pdot current" data-scene="majlis"  title="Majlis (المجلس)"></div>
    <div class="pdot"         data-scene="masjid"  title="Masjid Fanar (مسجد فنار)"></div>
    <span class="pdot-label">فنار</span>
    <div class="pdot"         data-scene="zubarah" title="Al Zubarah Fort (قلعة الزبارة)"></div>
    <span class="pdot-label">الزبارة</span>
  </div>
  <button id="temp-scene-btn" onclick="temporaryNextScene()" title="Temporary offline scene transition">Next scene</button>
  <div id="config">
    <label>Agent</label>
    <input id="agent-url" value="http://localhost:8000" />
    <label>TTS</label>
    <input id="tts-url" value="http://localhost:8000/tts" />
    <button id="tts-toggle" onclick="toggleTTS()">TTS ON</button>
  </div>
</div>

<!-- 3D canvas -->
<div id="canvas-wrap">
  <canvas id="c"></canvas>

  <div id="scene-label">
    <div class="en" id="label-en">Traditional Majlis</div>
    <div class="ar" id="label-ar">المجلس التقليدي</div>
  </div>

  <div id="loading-overlay">Loading model…</div>
  <div id="controls-hint">
    Left drag · Rotate<br>Right drag · Pan<br>Scroll · Zoom<br>Click · Select object
  </div>
  <div id="status-bar">Ready</div>
  <div id="audio-indicator"></div>

  <!-- Object checklist (hidden on exterior/transition scenes) -->
  <div id="obj-checklist" class="hidden">
    <div class="cl-title">Explore · استكشف</div>
    <div id="cl-items"></div>
  </div>

  <!-- Maryam speech bubble -->
  <div id="maryam-bubble">
    <div class="bubble-sender">مريم · Maryam</div>
    <div class="bubble-text" id="bubble-text"></div>
  </div>

  <!-- JSON Tool panel -->
  <div id="tool-panel">
    <div id="tool-panel-header">
      <span>⚙ tool calls</span>
      <button id="tool-panel-close" onclick="document.getElementById('tool-panel').classList.remove('visible')">✕</button>
    </div>
    <div id="tool-panel-body"></div>
  </div>

  <div id="mic-status">جاهز · Ready</div>

  <div id="hud">
    <button id="keyboard-toggle" onclick="toggleDrawer()" title="Type instead">⌨</button>
    <button id="mic-btn" onclick="toggleMic()" title="Speak to Maryam">🎙</button>
  </div>

  <div id="input-drawer">
    <input id="text-input" type="text" placeholder="اكتب رسالتك لمريم…" />
    <button id="send-btn" onclick="sendMessage()">إرسال</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
  }
}
</script>

<!-- ── Three.js 3D engine ──────────────────────────────────────────────────── -->
<script type="module">
import * as THREE        from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }   from 'three/addons/loaders/DRACOLoader.js';

// ── Scene definitions — keys match SCENE_OBJECTS in prompts.py ────────────────
// Exterior scenes have no required objects (transition scenes)
// Interior scenes carry the full object list
const MAJLIS_SCENE_ASSETS = [
  { asset:'majlisTent', targetSize:9.5, pos:[0, 0, 0], rot:[0, 1.57, 0] },
];

const MARYAM_STANDING_SCENE_ASSET = {
  asset:'maryamStanding', targetSize:0.8, pos:[1.0, 0, 3.0], rot:[0, -1.9, 0]
};

const MARYAM_SITTING_SCENE_ASSET = {
  asset:'maryamSitting', targetSize:0.8, pos:[1.55, 0, 0.35], rot:[0, -2.0, 0]
};

const MAJLIS_SCENIC_OBJECTS = [
  { id:'camel', interactive:false, nameEn:'Arabian Camel', nameAr:'جمل العربي',
    desc:'الجمل العربي، المعروف باسم سفينة الصحراء، كان ركنا أساسيا في حياة البدو؛ يحمل المتاع، ويمنح الحليب، ويرمز إلى الثروة والصبر والقدرة على التحمل.',
    asset:'camel', targetSize:1.35, rot:[0, Math.PI * 0.18, 0],
    color:0xc8904a, shape:'box', pos:[-5.2, 0, 2.05], scale:[1.0, 1.3, 0.5] },

const MAJLIS_EXPLORABLE_OBJECTS = [
  { id:'dallah', nameEn:'Dallah Coffee Pot', nameAr:'الدلة',
    desc:'الدلة، إبريق القهوة ذو الفوهة الطويلة، رمز من رموز الضيافة القطرية. وتقدم القهوة العربية المنكهة بالهيل والزعفران للضيوف ترحيبا وتكريما لهم.',
    asset:'dallah', targetSize:0.55, rot:[0, 0, 0],
    color:0xC8A030, shape:'cylinder', pos:[ 0.0, 0.06, 0.82], scale:[0.18,0.55,0.18] },
  { id:'sadu_carpet', nameEn:'Sadu Carpet', nameAr:'بساط السدو',

    texture:'saduPattern', textureRepeat:[1, 1],
    color:0x9A2C2C, shape:'box', pos:[ 0.0, 0.04, 1.2], scale:[3.2,0.06,2.4] },
  { id:'bakhoor', nameEn:'Bakhoor Incense', nameAr:'البخور',
    desc:'البخور قطع من الخشب المعطر بالزيوت الزكية، توضع في المبخرة وتمرر بين الضيوف كعلامة ترحيب. ورائحة العود جزء أصيل من أجواء الضيافة في الخليج.',
    asset:'bakhoor', targetSize:0.45, rot:[0, 0.2, 0],

  { id:'cushion', nameEn:'Floor Cushion', nameAr:'الوسادة',
    desc:'تكون جلسة المجلس على مستوى الأرض، وتنتشر الوسائد على الجوانب لتمنح الضيوف الراحة. هذا النمط من الجلوس يعبر عن القرب والمساواة بين الحاضرين.',
    asset:'cushion', targetSize:0.6, rot:[0, 0, 0],
    texture:'cushionPattern', textureRepeat:[1, 1],
    color:0x8B2020, shape:'box', pos:[-1.6, 0.05, 0.8], scale:[0.9,0.22,0.65] },
];

const SCENES = {

  // ── Majlis exterior: camel + Bedouin tent ─────────────────────────────────
  majlis_ext: {
    nameEn: 'Traditional Majlis', nameAr: 'المجلس التقليدي',
    camera: { position: [0, 2.0, 10.0], target: [0, 1.0, 0] },
    sky: 0x08090d, fog: { color: 0x08090d, near: 12, far: 28 },
    ambient: { color: 0xffedd0, intensity: 0.35 },
    hemi:    { sky: 0x536f9f, ground: 0x3a1f0d, intensity: 1.75 },
    dir:     { color: 0xb6cfff, intensity: 1.15, pos: [-6, 8, 6] },
    point:   { color: 0xff8a32, intensity: 1.8, distance: 10, pos: [-3.45, 0.75, 3.35] },
    extraLights: [
      { color:0xffc477, intensity:4.2, distance:16, pos:[ 2.7, 2.45, -0.35] },
      { color:0xffc477, intensity:3.4, distance:15, pos:[-2.7, 2.45, -0.35] },
      { color:0xffa85c, intensity:2.8, distance:11, pos:[ 0.0, 1.35,  2.35] },
    ],
    groundColor: 0xd8b878,
    groundTexture: 'sandRipple',
    stars: true,
    sceneAssets: [
      ...MAJLIS_SCENE_ASSETS,
      MARYAM_STANDING_SCENE_ASSET,
    ],
    objects: [
      ...MAJLIS_SCENIC_OBJECTS,
      ...MAJLIS_EXPLORABLE_OBJECTS.map(od => ({ ...od, interactive:false })),
    ]
  },

  // ── Majlis interior: dallah, sadu carpet, bakhoor, cushion ───────────────
  majlis: {
    nameEn: 'Traditional Majlis — Interior', nameAr: 'المجلس التقليدي — الداخل',
    camera: { position: [-1.0, 0.5, 1.9], target: [2.0, 1.0, -1.0] },
    sky: 0x08090d, fog: { color: 0x08090d, near: 12, far: 28 },
    ambient: { color: 0xffedd0, intensity: 0.35 },
    hemi:    { sky: 0x536f9f, ground: 0x3a1f0d, intensity: 1.75 },
    dir:     { color: 0xb6cfff, intensity: 1.15, pos: [-6, 8, 6] },
    point:   { color: 0xff8a32, intensity: 1.8, distance: 10, pos: [-3.45, 0.75, 3.35] },
    extraLights: [

function createSandRippleTexture(grayscale = false) {
  const size = 512;
  const textureCanvas = document.createElement('canvas');
  textureCanvas.width = size;
  textureCanvas.height = size;
  const ctx = textureCanvas.getContext('2d');
  const image = ctx.createImageData(size, size);
  const data = image.data;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const nx = x / size;
      const ny = y / size;
      const ripple =
        Math.sin((nx * 18 + Math.sin(ny * 7) * 0.7) * Math.PI * 2) * 0.5 +
        Math.sin((ny * 13 + nx * 3.5) * Math.PI * 2) * 0.25;
      const shade = THREE.MathUtils.clamp(0.58 + ripple * 0.16, 0, 1);
      const i = (y * size + x) * 4;

      if (grayscale) {
        const v = Math.floor(shade * 255);
        data[i] = v; data[i + 1] = v; data[i + 2] = v;
      } else {
        data[i] = Math.floor(198 * shade + 78);
        data[i + 1] = Math.floor(164 * shade + 66);
        data[i + 2] = Math.floor(105 * shade + 42);
      }
      data[i + 3] = 255;
    }
  }

  ctx.putImageData(image, 0, 0);
  const texture = new THREE.CanvasTexture(textureCanvas);
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(8, 8);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

  ambientLight.color.set(d.ambient.color); ambientLight.intensity = d.ambient.intensity;
  if (d.hemi) {
    hemiLight.color.set(d.hemi.sky);
    hemiLight.groundColor.set(d.hemi.ground);
    hemiLight.intensity = d.hemi.intensity;
  } else {
    hemiLight.intensity = 0;
  }
  dirLight.color.set(d.dir.color); dirLight.intensity = d.dir.intensity; dirLight.position.set(...d.dir.pos);
  pointLight.color.set(d.point.color);
  pointLight.intensity = d.point.intensity;
  pointLight.distance = d.point.distance || 14;
  pointLight.position.set(...d.point.pos);
  sceneExtraLights.clear();
  (d.extraLights || []).forEach(lightDef => {
    const light = lightDef.kind === 'spot'

    light.position.set(...lightDef.pos);
    sceneExtraLights.add(light);
    if (lightDef.kind === 'spot') {
      const target = new THREE.Object3D();
      target.position.set(...(lightDef.target || [0, 1.5, 0]));
      sceneExtraLights.add(target);
      light.target = target;

function loadGltf(assetKey) {
  const url = MODEL_ASSETS[assetKey];
  if (!url) return Promise.reject(new Error(`Unknown model asset: ${assetKey}`));
  if (!gltfCache.has(url)) {
    gltfCache.set(url, new Promise((resolve, reject) => {
      gltfLoader.load(url, resolve, undefined, reject);
    }));
  }
  return gltfCache.get(url);
}

function cloneGltfScene(gltf) {
  const model = gltf.scene.clone(true);
  model.traverse(child => {
    if (!child.isMesh) return;
    child.castShadow = true;
    child.receiveShadow = true;
    if (Array.isArray(child.material)) child.material = child.material.map(mat => mat.clone());
    else if (child.material) child.material = child.material.clone();
  });
  return model;
}

function fitModelToSetup(model, setup) {
  model.rotation.set(...(setup.rot || [0, 0, 0]));
  model.updateMatrixWorld(true);

  let box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const maxSize = Math.max(size.x, size.y, size.z) || 1;
  const targetSize = setup.targetSize || 1;
  model.scale.multiplyScalar(targetSize / maxSize);
  model.updateMatrixWorld(true);

  box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const pos = setup.pos || setup.position || [0, 0, 0];
  model.position.x += pos[0] - center.x;
  model.position.y += pos[1] - box.min.y;
  model.position.z += pos[2] - center.z;
  model.updateMatrixWorld(true);
}

function applyUserDataToModel(model, data) {
  model.userData = { ...model.userData, ...data };
  model.traverse(child => {
    if (!child.isMesh) return;
    child.userData = { ...child.userData, ...data };
  });
}

function createObjectTexture(textureKey, repeat = [1, 1]) {
  const url = TEXTURE_ASSETS[textureKey];
  if (!url) return null;

  const texture = textureLoader.load(url);
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(...repeat);
  texture.colorSpace = THREE.SRGBColorSpace;
  texture.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
  return texture;
}

function applyTextureToMaterial(material, textureKey, repeat) {
  if (!material) return;
  const texture = createObjectTexture(textureKey, repeat);
  if (!texture) return;

  material.map = texture;
  if (material.color) material.color.set(0xffffff);
  material.roughness = Math.max(material.roughness ?? 0.75, 0.82);
  material.needsUpdate = true;
}

function applyObjectTexture(object, objectDef) {
  if (!objectDef.texture) return;

  object.traverse?.(child => {
    if (!child.isMesh || !child.geometry?.attributes?.uv) return;
    if (Array.isArray(child.material)) {
      child.material.forEach(mat => applyTextureToMaterial(mat, objectDef.texture, objectDef.textureRepeat));
    } else {
      applyTextureToMaterial(child.material, objectDef.texture, objectDef.textureRepeat);
    }
  });

  if (object.isMesh && object.geometry?.attributes?.uv) {
    applyTextureToMaterial(object.material, objectDef.texture, objectDef.textureRepeat);
  }
}

function createPrimitiveObject(od) {
  const geo = od.shape === 'cylinder'
    ? new THREE.CylinderGeometry(od.scale[0], od.scale[0]*1.1, od.scale[1], 16)
    : new THREE.BoxGeometry(...od.scale);
  const mat  = new THREE.MeshStandardMaterial({ color: od.color, roughness: 0.75, metalness: 0.1 });
  applyTextureToMaterial(mat, od.texture, od.textureRepeat);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...od.pos);
  mesh.castShadow = mesh.receiveShadow = true;
  mesh.userData = { ...od };
  scene.add(mesh);
  placeholders.push(mesh);
}

async function addSceneModel(assetDef, token) {
  try {
    const gltf = await loadGltf(assetDef.asset);
    if (token !== buildToken) return;
    const model = cloneGltfScene(gltf);
    fitModelToSetup(model, assetDef);
    scene.add(model);
    sceneModels.push(model);
  } catch (err) {
    console.warn(`Failed to load scene asset ${assetDef.asset}:`, err);
    setStatus(`Missing model: ${assetDef.asset}`);
  }
}

async function addObjectModel(od, token) {
  try {
    const gltf = await loadGltf(od.asset);
    if (token !== buildToken) return;
    const model = cloneGltfScene(gltf);
    fitModelToSetup(model, od);
    applyObjectTexture(model, od);
    applyUserDataToModel(model, od);
    scene.add(model);
    placeholders.push(model);
  } catch (err) {
    console.warn(`Failed to load object asset ${od.asset}; using primitive fallback`, err);
    if (token === buildToken) createPrimitiveObject(od);
  }
}

function clearBuiltScene() {
  placeholders.forEach(m => scene.remove(m));
  sceneModels.forEach(m => scene.remove(m));
  placeholders = [];
  sceneModels = [];
}

function buildPlaceholders(key) {
  buildToken += 1;
  const token = buildToken;
  clearBuiltScene();

  (SCENES[key].sceneAssets || []).forEach(assetDef => addSceneModel(assetDef, token));
  SCENES[key].objects.forEach(od => {
    if (od.asset) addObjectModel(od, token);
    else createPrimitiveObject(od);
  });
}

function switchScene(key) {
  if (!SCENES[key]) { console.warn('Unknown scene:', key); return; }
  currentKey = key;
  applyScene(key); buildPlaceholders(key); deselect();
  setStatus(`Scene: ${SCENES[key].nameEn}`);
  applySceneCamera(key);
  if (window._buildChecklist) window._buildChecklist(key);
}

// ── Raycasting ─────────────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const targets = [...placeholders];
  if (loadedModel) loadedModel.traverse(c => { if (c.isMesh) targets.push(c); });
  const hits = raycaster.intersectObjects(targets, true);
  if (hits.length && !hits[0].object.userData.isGround) select(getPlaceholderRoot(hits[0].object) || hits[0].object);
  else deselect();
});

function getPlaceholderRoot(object) {
  let node = object;
  while (node) {
    if (placeholders.includes(node)) return node;
    node = node.parent;
  }
  return null;
}

function select(mesh) {
  if (selectedMesh) resetColor(selectedMesh);
  selectedMesh = mesh;
  setHighlightColor(mesh, 0xF5C85A);
  if (mesh.userData.id) {
    if (mesh.userData.interactive === false) {
      setStatus(`${mesh.userData.nameEn} is scenic only`);
      return;
    }
    if (window._onObjectClick) window._onObjectClick(mesh.userData.id, mesh.userData.desc || mesh.userData.nameEn);
    setStatus(`Selected: ${mesh.userData.nameEn}`);
  }
}
function deselect() { if (selectedMesh) resetColor(selectedMesh); selectedMesh = null; }
function resetColor(mesh) {
  mesh.traverse?.(child => {
    if (child.material?.color && child.userData._origColor !== undefined)
      child.material.color.set(child.userData._origColor);
  });
  if (mesh.material?.color && mesh.userData._origColor !== undefined)
    mesh.material.color.set(mesh.userData._origColor);
}
function setHighlightColor(object, color) {
  object.traverse?.(child => {
    if (!child.material?.color) return;
    if (child.userData._origColor === undefined) child.userData._origColor = child.material.color.getHex();
    child.material.color.set(color);
  });
  if (object.material?.color) {
    if (object.userData._origColor === undefined) object.userData._origColor = object.material.color.getHex();
    object.material.color.set(color);
  }
}

function highlightObject(objId) {
  const mesh = placeholders.find(m => m.userData.id === objId);
  if (!mesh) return;
  if (selectedMesh) resetColor(selectedMesh);
  selectedMesh = mesh;
  setHighlightColor(mesh, 0xF5C85A);
  const box = new THREE.Box3().setFromObject(mesh);
  controls.target.copy(box.getCenter(new THREE.Vector3())); controls.update();
}

// ── GLB loading ────────────────────────────────────────────────────────────────
function loadFile(file) {
  showLoading(true);
  const url = URL.createObjectURL(file);
  gltfLoader.load(url, gltf => {
    if (loadedModel) scene.remove(loadedModel);
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    model.scale.setScalar(3.0 / Math.max(...box.getSize(new THREE.Vector3()).toArray()));
    const box2 = new THREE.Box3().setFromObject(model);
    const ctr  = box2.getCenter(new THREE.Vector3());
    model.position.x -= ctr.x; model.position.z -= ctr.z; model.position.y -= box2.min.y;
    model.traverse(c => { if (c.isMesh) c.castShadow = c.receiveShadow = true; });
    scene.add(model); loadedModel = model;
    const box3 = new THREE.Box3().setFromObject(model);
    const ctr3 = box3.getCenter(new THREE.Vector3());
    const dist = Math.max(...box3.getSize(new THREE.Vector3()).toArray()) * 2;
    controls.target.copy(ctr3);
    camera.position.set(ctr3.x+dist, ctr3.y+dist*0.6, ctr3.z+dist);
    controls.update();
    URL.revokeObjectURL(url); showLoading(false);
    document.getElementById('drop-hint')?.style.setProperty('display', 'none');
    setStatus(`Loaded: ${file.name}`);
  }, xhr => { if (xhr.total) setStatus(`Loading… ${Math.round(xhr.loaded/xhr.total*100)}%`); },
  err => { showLoading(false); setStatus(`Error: ${err.message}`); });
}
wrap.addEventListener('dragover', e => e.preventDefault());
wrap.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && (f.name.endsWith('.glb') || f.name.endsWith('.gltf'))) loadFile(f);
});

function showLoading(v) { document.getElementById('loading-overlay').style.display = v ? 'flex' : 'none'; }
function setStatus(msg) { document.getElementById('status-bar').textContent = msg; }

// ── Animate ────────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate); controls.update();
  const t = clock.getElapsedTime();
  // gentle camel bob
  const camel = placeholders.find(m => m.userData.id === 'camel');
  if (camel) camel.position.y = camel.userData.pos[1] + Math.sin(t * 0.6) * 0.03;
  // minaret slow rotate
  const minaret = placeholders.find(m => m.userData.id === 'minaret');
  if (minaret) minaret.rotation.y = t * 0.04;
  // watchtower
  const tower = placeholders.find(m => m.userData.id === 'watchtower');
  if (tower) tower.rotation.y = t * 0.05;
  // flickering warmth
  const base = SCENES[currentKey]?.point.intensity ?? 0.8;
  pointLight.intensity = base * (0.92 + 0.08 * Math.sin(t * 2.1));
  renderer.render(scene, camera);
}

applyScene('majlis_ext'); buildPlaceholders('majlis_ext'); applySceneCamera('majlis_ext'); animate();

window._switchScene     = switchScene;
window._highlightObject = highlightObject;
window._SCENES          = SCENES;
window._STORY_ORDER     = STORY_ORDER;
window._getCurrentScene = () => currentKey;
</script>

<!-- ── Game state + Agent UI ──────────────────────────────────────────────── -->
<script>
// ── SCENE_REQUIREMENTS mirrors storyline.py exactly ────────────────────────────
// Exterior/transition scenes have no required objects or badge
const SCENE_REQUIREMENTS = {
  majlis_ext: {
    required_objects:  null,   // transition scene — no checklist
    required_questions: 0,
    badge_title:        null,
    next_scene:         'majlis',   // MAJLIS_ENTER
  },
  majlis: {
    required_objects:  ['dallah','sadu_carpet','bakhoor','cushion'],
    required_questions: 1,
    badge_title:        'ضيف المجلس · Guest of the Majlis',
    next_scene:         'masjid_ext',   // MASJID_ARRIVAL
  },
  masjid_ext: {
    required_objects:  null,
    required_questions: 0,
    badge_title:        null,
    next_scene:         'masjid',   // MASJID_ENTER
  },
  masjid: {
    required_objects:  ['quran','mihrab','hadeeth','imam'],
    required_questions: 1,
    badge_title:        'زائر المسجد · Visitor of the Masjid',
    next_scene:         'zubarah',   // ZUBARAH_ARRIVAL
  },
  zubarah: {
    required_objects:  ['main_gate','watchtower','inner_court','well'],
    required_questions: 1,
    badge_title:        'حارس الزبارة · Guardian of Zubarah',
    next_scene:         null,   // JOURNEY_COMPLETE
  },
};

// Map scene key → completable dot (only 3 scenes have badges)
const BADGE_SCENES = ['majlis', 'masjid', 'zubarah'];

// Phase values — mirrors StoryPhase enum values in storyline.py
const PHASE_FOR_SCENE = {
  majlis_ext:  'majlis_intro',
  majlis:      'majlis_explore',
  masjid_ext:  'masjid_arrival',
  masjid:      'masjid_explore',
  zubarah:     'zubarah_arrival',
};

// Starting values must match GameState defaults in your backend's storyline.py.
// If your backend still has current_scene="majlis_ext", change 'majlis' → 'majlis_ext' here.
let gameState = {
  current_phase:    'majlis_intro',
  current_scene:    'majlis_ext',
  explored_objects: [],
  questions_asked:  0,
  completed_scenes: [],
  inventory:        [],
  badges:           [],
};

const SESSION_ID = 'player_' + Math.random().toString(36).slice(2, 8);
let history      = [];
let ttsEnabled   = true;
let isRecording  = false;
let recognition  = null;
let currentAudio = null;
let bubbleTimer  = null;
let drawerOpen   = false;

// ── Checklist ──────────────────────────────────────────────────────────────────
function buildChecklist(sceneKey) {
  const reqs = SCENE_REQUIREMENTS[sceneKey];
  const cl   = document.getElementById('obj-checklist');

  // Hide checklist for transition/exterior scenes
  if (!reqs || !reqs.required_objects) {
    cl.classList.add('hidden'); return;
  }
  cl.classList.remove('hidden');

  const scenes    = window._SCENES;
  const container = document.getElementById('cl-items');
  container.innerHTML = '';

  reqs.required_objects.forEach(objId => {
    const obj  = scenes[sceneKey]?.objects.find(o => o.id === objId);
    const done = gameState.explored_objects.includes(objId);
    const div  = document.createElement('div');
    div.className = 'cl-item' + (done ? ' done' : '');
    div.id = 'cl-' + objId;
    div.innerHTML = `<span class="cl-check">${done ? '✓' : ''}</span>
      <span>${obj ? obj.nameAr + ' · ' + obj.nameEn : objId}</span>`;
    container.appendChild(div);
  });
}
window._buildChecklist = buildChecklist;

function markChecked(objId) {
  const item = document.getElementById('cl-' + objId);
  if (item && !item.classList.contains('done')) {
    item.classList.add('done');
    item.querySelector('.cl-check').textContent = '✓';
  }
}

function getSceneObject(sceneKey, objId) {
  return window._SCENES?.[sceneKey]?.objects?.find(o => o.id === objId) || null;
}

function isRequiredObjectInCurrentScene(objId) {
  const reqs = SCENE_REQUIREMENTS[gameState.current_scene];
  return Array.isArray(reqs?.required_objects) && reqs.required_objects.includes(objId);
}

function isExteriorScene(sceneKey) {
  return sceneKey === 'majlis_ext' || sceneKey === 'masjid_ext';
}

function isInteriorScene(sceneKey) {
  return sceneKey === 'majlis' || sceneKey === 'masjid';
}

function isExteriorToInteriorTransition(previousScene, nextScene) {
  return (previousScene === 'majlis_ext' && nextScene === 'majlis') ||
         (previousScene === 'masjid_ext' && nextScene === 'masjid');
}

function staticObjectScript(sceneKey, objId, fallback) {
  const obj = getSceneObject(sceneKey, objId);
  return obj?.desc || fallback || 'هذا عنصر مهم في هذا المشهد. · This is an important object in this scene.';
}

function applyVisualSceneFromState() {
  if (gameState.current_scene && window._switchScene) {
    window._switchScene(gameState.current_scene);
  }
  buildChecklist(gameState.current_scene);
  (gameState.explored_objects || []).forEach(markChecked);
}

function syncGameStateFromServer(serverState, options = {}) {
  if (!serverState) return;

  const previousVisualScene = window._getCurrentScene ? window._getCurrentScene() : gameState.current_scene;
  Object.assign(gameState, serverState);

  updatePhaseLabel();
  updateProgressDots();

  // For exterior arrival cutscenes, keep the exterior visible while Maryam speaks.
  // The visual switch to the interior happens after her audio/text explanation.
  if (options.deferVisualSceneSwitch && isExteriorToInteriorTransition(previousVisualScene, gameState.current_scene)) {
    return;
  }

  if (gameState.current_scene && gameState.current_scene !== previousVisualScene && window._switchScene) {
    window._switchScene(gameState.current_scene);
  }

  buildChecklist(gameState.current_scene);
  (gameState.explored_objects || []).forEach(markChecked);
}

async function syncStaticTool(toolName, args, options = {}) {
  try {
    const res = await fetch(`${document.getElementById('agent-url').value.trim()}/tool`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: SESSION_ID,
        tool_name: toolName,
        args,
        game_state: gameState,
      }),
    });
    if (!res.ok) throw new Error(`Tool sync ${res.status}`);
    const data = await res.json();
    if (options.applyServerState && data.game_state) syncGameStateFromServer(data.game_state);
    return data;
  } catch (err) {
    console.warn('Static tool sync failed:', err);
    return null;
  }
}

function runStaticExploreObject(objId, desc) {
  const sceneKey = gameState.current_scene;
  const obj = getSceneObject(sceneKey, objId);
  const spoken = staticObjectScript(sceneKey, objId, desc);
  const tool = {
    name: 'explore_object',
    args: { object_id: objId, spoken_context: spoken },
  };

  if (!gameState.explored_objects.includes(objId)) {
    gameState.explored_objects.push(objId);
  }

  markChecked(objId);
  if (window._highlightObject) window._highlightObject(objId);
  showToolPanel([tool]);
  showBubble(spoken, false);
  setStatus(`Explored: ${obj?.nameEn || objId}`);
  updateProgressDots();

  syncStaticTool('explore_object', tool.args);
  checkSceneCompletion();
}

// Player clicks a 3D object. Clicks run a static local script immediately,
// then sync the matching explore_object tool to the backend.
window._onObjectClick = function(objId, desc) {
  if (!isRequiredObjectInCurrentScene(objId)) {
    showBubble(desc || 'هذا جزء من المشهد فقط. · This is only part of the scene.', false);
    return;
  }

  runStaticExploreObject(objId, desc);
};

// ── Scene completion logic ─────────────────────────────────────────────────────
function checkSceneCompletion() {
  const reqs = SCENE_REQUIREMENTS[gameState.current_scene];
  if (!reqs || !reqs.required_objects) return;  // exterior scenes skip
  const allDone  = reqs.required_objects.every(o => gameState.explored_objects.includes(o));
  const alreadyCompleted = gameState.completed_scenes.includes(gameState.current_scene);
  if (allDone && !alreadyCompleted) {
    setStatus('All objects explored · Ask Maryam anything');
  }
}

function completeScene() {
  const reqs = SCENE_REQUIREMENTS[gameState.current_scene];
  const sceneName = gameState.current_scene;
  gameState.completed_scenes.push(gameState.current_scene);
  if (reqs.badge_title) {
    gameState.badges.push(reqs.badge_title);
    showToolPanel([{
      name: 'award_badge',
      args: {
        scene_name: sceneName,
        badge_title: reqs.badge_title,
        congratulations: `أحسنت! أكملت هذا المشهد. · Well done! You completed this scene.`,
      },
    }]);
    showBadgeToast(reqs.badge_title);
    syncStaticTool('award_badge', {
      scene_name: sceneName,
      badge_title: reqs.badge_title,
      congratulations: `أحسنت! أكملت هذا المشهد. · Well done! You completed this scene.`,
    });
  }
  updateProgressDots();

  if (reqs.next_scene) {
    showBubble('أحسنت! يمكنك الاستمرار في طرح الأسئلة هنا، أو اطلب مني عندما تريد الانتقال للمشهد التالي. · Well done! You can keep asking questions here, or tell me when you want to move to the next scene.', false);
  } else {
    gameState.current_phase = 'journey_complete';
    updatePhaseLabel();
    setTimeout(() => showBubble('🌟 لقد أتممت رحلتك عبر التراث القطري! · You have completed your journey through Qatar\'s heritage!', false), 3000);
  }
}

function transitionTo(sceneKey) {
  gameState.current_scene    = sceneKey;
  gameState.explored_objects = [];
  gameState.questions_asked  = 0;
  gameState.current_phase    = PHASE_FOR_SCENE[sceneKey] || sceneKey;
  updatePhaseLabel();
  updateProgressDots();
  if (window._switchScene) window._switchScene(sceneKey);
  buildChecklist(sceneKey);
  updateTemporarySceneButton();
}

function getTemporaryNextScene() {
  const currentScene = gameState.current_scene;
  const configuredNext = SCENE_REQUIREMENTS[currentScene]?.next_scene;
  if (configuredNext) return configuredNext;

  const currentIndex = window._STORY_ORDER?.indexOf(currentScene) ?? -1;
  if (currentIndex >= 0) return window._STORY_ORDER[currentIndex + 1] || null;
  return null;
}

function getSceneShortName(sceneKey) {
  return {
    majlis_ext: 'Majlis exterior',
    majlis: 'Majlis',
    masjid_ext: 'Masjid exterior',
    masjid: 'Masjid',
    zubarah: 'Zubarah',
  }[sceneKey] || sceneKey;
}

function updateTemporarySceneButton() {
  const btn = document.getElementById('temp-scene-btn');
  if (!btn) return;

  const nextScene = getTemporaryNextScene();
  btn.disabled = !nextScene;
  btn.textContent = nextScene ? `Next: ${getSceneShortName(nextScene)}` : 'No next scene';
}

function temporaryNextScene() {
  const nextScene = getTemporaryNextScene();
  if (!nextScene) {
    setStatus('No next scene');
    return;
  }

  const tool = { name: 'transition_scene', args: { scene_id: nextScene } };
  showToolPanel([tool]);
  transitionTo(nextScene);
  showBubble(`انتقال مؤقت بدون API · Temporary offline transition to ${getSceneShortName(nextScene)}.`, false);
  setStatus(`Temporary transition: ${getSceneShortName(nextScene)}`);
}

// ── Progress dots — one per badge scene ───────────────────────────────────────
function updateProgressDots() {
  document.querySelectorAll('.pdot').forEach(dot => {
    const s = dot.dataset.scene;
    dot.classList.remove('done','current');
    if (gameState.completed_scenes.includes(s)) dot.classList.add('done');
    // Show current on both interior & exterior of same location
    else if (
      s === gameState.current_scene ||
      (s === 'majlis'  && gameState.current_scene === 'majlis_ext')  ||
      (s === 'masjid'  && gameState.current_scene === 'masjid_ext')
    ) dot.classList.add('current');
  });
}

function updatePhaseLabel() {
  document.getElementById('phase-text').textContent = gameState.current_phase;
}

// ── Speech bubble ──────────────────────────────────────────────────────────────
function showBubble(text, isTyping) {
  const bubble  = document.getElementById('maryam-bubble');
  const content = document.getElementById('bubble-text');
  if (bubbleTimer) { clearTimeout(bubbleTimer); bubbleTimer = null; }
  if (isTyping) {
    content.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
  } else {
    content.textContent = text;
    const ms = Math.min(Math.max(text.length * 42, 4500), 16000);
    bubbleTimer = setTimeout(hideBubble, ms);
  }
  bubble.classList.add('visible');
}
function hideBubble() { document.getElementById('maryam-bubble').classList.remove('visible'); }

// ── JSON Tool Panel ────────────────────────────────────────────────────────────
function syntaxColor(json) {
  return json
    .replace(/("(?:\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?)/g, m =>
      m.endsWith(':') ? `<span class="jkey">${m}</span>` : `<span class="jstr">${m}</span>`)
    .replace(/\b(true|false)\b/g, '<span class="jbool">$1</span>')
    .replace(/\b(-?\d+(?:\.\d+)?)\b/g, '<span class="jnum">$1</span>');
}

function showToolPanel(tools) {
  if (!tools?.length) return;
  const panel = document.getElementById('tool-panel');
  const body  = document.getElementById('tool-panel-body');
  const ts    = new Date().toLocaleTimeString();
  const frag  = document.createDocumentFragment();
  tools.forEach(t => {
    const entry = document.createElement('div');
    entry.className = 'tool-entry';
    const pretty = JSON.stringify(t.args ?? {}, null, 2);
    entry.innerHTML = `<div class="tool-ts">${ts}</div>
      <div class="tool-name">${t.name}</div>
      <pre class="tool-json">${syntaxColor(pretty)}</pre>`;
    frag.appendChild(entry);
  });
  body.insertBefore(frag, body.firstChild);
  panel.classList.add('visible');
}

// ── TTS ────────────────────────────────────────────────────────────────────────
function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  const btn = document.getElementById('tts-toggle');
  btn.textContent = ttsEnabled ? 'TTS ON' : 'TTS OFF';
  btn.className   = ttsEnabled ? '' : 'off';
}

async function speakReply(text) {
  setMicStatus('مريم تتكلم… · Speaking…','speaking');
  document.getElementById('audio-indicator').style.display = 'block';
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  try {
    const res = await fetch(document.getElementById('tts-url').value.trim(), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!res.ok) throw new Error(`TTS ${res.status}`);
    const url = URL.createObjectURL(await res.blob());
    currentAudio = new Audio(url);
    currentAudio.onended = () => {
      setMicStatus('جاهز · Ready');
      document.getElementById('audio-indicator').style.display = 'none';
      URL.revokeObjectURL(url);
    };
    await currentAudio.play();
  } catch (err) {
    console.warn('TTS failed:', err.message);
    setMicStatus('جاهز · Ready');
    document.getElementById('audio-indicator').style.display = 'none';
  }
}

// ── Agent call ─────────────────────────────────────────────────────────────────
async function sendMessage(overrideText, options = {}) {
  const input   = document.getElementById('text-input');
  const message = overrideText ?? input.value.trim();
  if (!message) return;
  if (!overrideText) input.value = '';

  // Do NOT increment questions_asked on the frontend.
  // The backend run_turn() owns question counting and scene completion state.

  document.getElementById('send-btn').disabled = true;
  document.getElementById('text-input').disabled = true;
  setMicStatus('مريم تفكر… · Thinking…','thinking');
  showBubble('', true);

  try {
    const res = await fetch(`${document.getElementById('agent-url').value.trim()}/turn`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID, user_message: message, history, game_state: gameState })
    });
    if (!res.ok) throw new Error(`Agent error: ${res.status}`);
    const data = await res.json();
    history = data.updated_history ?? history;

    const tools = data.tool_calls_executed || [];
    const previousVisualScene = window._getCurrentScene ? window._getCurrentScene() : gameState.current_scene;
    const nextServerScene = data.game_state?.current_scene;
    const deferExteriorTransition = isExteriorToInteriorTransition(previousVisualScene, nextServerScene);

    if (tools.length) {
      showToolPanel(tools);
      // Run non-transition visual effects immediately, but delay the actual scene swap
      // until Maryam has finished explaining the exterior setting.
      handleToolCalls(tools.filter(t => t.name !== 'transition_scene'));
    }

    // Server-side GameState is the source of truth after tool execution.
    if (data.game_state) {
      syncGameStateFromServer(data.game_state, { deferVisualSceneSwitch: deferExteriorTransition });
    }

    showBubble(data.reply, false);

    if (ttsEnabled && data.reply && !options.silentTTS) await speakReply(data.reply);
    else setMicStatus('جاهز · Ready');

    if (deferExteriorTransition) {
      setMicStatus('ندخل الآن… · Entering…', 'thinking');
      setTimeout(() => {
        handleToolCalls(tools.filter(t => t.name === 'transition_scene'));
        applyVisualSceneFromState();
        setMicStatus('جاهز · Ready');
      }, 900);
    }

  } catch (err) {
    showBubble(`⚠️ خطأ في الاتصال · ${err.message}`, false);
    setMicStatus('خطأ · Error');
    console.error(err);
  } finally {
    document.getElementById('send-btn').disabled = false;
    document.getElementById('text-input').disabled = false;
  }
}

// ── Tool call handler ──────────────────────────────────────────────────────────
function handleToolCalls(tools) {
  tools.forEach(tool => {
    console.log('[TOOL]', tool.name, tool.args);
    switch (tool.name) {

      case 'transition_scene': {
        // Backend state will decide the real scene. This is only a quick visual hint.
        const sid = tool.args.scene_id;
        if (sid && window._SCENES?.[sid] && window._switchScene) window._switchScene(sid);
        break;
      }

      case 'explore_object': {
        const oid = tool.args.object_id;
        if (window._highlightObject) window._highlightObject(oid);
        markChecked(oid);
        break;
      }

      case 'award_badge': {
        const title = tool.args.badge_title;
        if (title) showBadgeToast(title);
        break;
      }

      case 'trigger_animation':
        console.log('→ animation:', tool.args.animation);
        break;

      case 'give_directions':
        if (window._highlightObject) window._highlightObject(tool.args.destination);
        break;

      case 'open_ui':
        console.log('→ UI panel:', tool.args.panel);
        break;
    }
  });
}

// ── Badge toast ────────────────────────────────────────────────────────────────
function showBadgeToast(title) {
  const el = document.createElement('div');
  Object.assign(el.style, {
    position:'absolute', top:'60px', left:'50%',
    transform:'translateX(-50%)',
    background:'rgba(245,200,90,0.14)',
    border:'1px solid rgba(245,200,90,0.45)',
    borderRadius:'12px', padding:'12px 22px',
    color:'#F5C85A', fontSize:'15px',
    direction:'rtl', zIndex:'999',
    backdropFilter:'blur(10px)',
    animation:'badge-in 0.4s ease forwards',
    whiteSpace:'nowrap',
  });
  el.textContent = '🏅 ' + title;
  document.getElementById('canvas-wrap').appendChild(el);
  setTimeout(() => {
    el.style.animation = 'badge-out 0.5s ease forwards';
    setTimeout(() => el.remove(), 520);
  }, 3800);
}

// ── STT ────────────────────────────────────────────────────────────────────────
function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Speech recognition requires Chrome.'); return false; }
  recognition = new SR();
  recognition.continuous = false; recognition.interimResults = true; recognition.lang = 'ar-QA';
  recognition.onstart  = () => { setMicStatus('جارٍ الاستماع… · Listening…','listening'); document.getElementById('mic-btn').classList.add('active'); };
  recognition.onresult = e => {
    const t = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('text-input').value = t;
    if (e.results[e.results.length-1].isFinal) recognition.stop();
  };
  recognition.onend = () => {
    document.getElementById('mic-btn').classList.remove('active');
    isRecording = false;
    const t = document.getElementById('text-input').value.trim();
    if (t) { setMicStatus('جاهز · Ready'); sendMessage(); }
    else setMicStatus('لم يتم التعرف · No speech');
  };
  recognition.onerror = e => {
    setMicStatus(`خطأ · ${e.error}`);
    document.getElementById('mic-btn').classList.remove('active');
    isRecording = false;
  };
  return true;
}

function toggleMic() {
  if (!recognition && !initSpeechRecognition()) return;
  if (isRecording) { recognition.stop(); isRecording = false; }
  else             { isRecording = true;  recognition.start(); }
}

// ── Keyboard drawer ────────────────────────────────────────────────────────────
function toggleDrawer() {
  drawerOpen = !drawerOpen;
  document.getElementById('input-drawer').classList.toggle('open', drawerOpen);
  document.getElementById('keyboard-toggle').classList.toggle('active', drawerOpen);
  if (drawerOpen) setTimeout(() => document.getElementById('text-input').focus(), 220);
}
document.getElementById('text-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function setMicStatus(text, cls) {
  const el = document.getElementById('mic-status');
  el.textContent = text; el.className = cls || '';
}

// ── Boot ───────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    buildChecklist(gameState.current_scene);
    updateProgressDots();
    updateTemporarySceneButton();
  }, 300);
  showBubble('مرحباً! أنا مريم — مرشدتك الثقافية في قطر. اضغط على المايكروفون أو ⌨ لتبدأ رحلتك. · Hello! I am Maryam, your Qatari cultural guide. Tap the mic or ⌨ to begin your journey.', false);
  setMicStatus(`Session: ${SESSION_ID}`);
});
</script>
