<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qatar Heritage Scene Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0b08;
      color: #f0e6d0;
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: rgba(0,0,0,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #topbar h1 { font-size: 15px; font-weight: 600; color: #F5C85A; margin-right: 10px; white-space: nowrap; }

    .scene-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #c8b89a;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .scene-btn:hover { background: rgba(255,255,255,0.12); color: #f0e6d0; }
    .scene-btn.active { background: rgba(245,200,90,0.15); border-color: #F5C85A; color: #F5C85A; }

    #main { display: flex; flex: 1; overflow: hidden; }

    #sidebar {
      width: 260px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.4);
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 14px 12px;
      gap: 8px;
    }
    #sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.3); margin-bottom: 4px; padding-left: 4px; }

    .obj-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      width: 100%;
    }
    .obj-btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.16); }
    .obj-btn.selected { background: rgba(245,200,90,0.1); border-color: rgba(245,200,90,0.4); }
    .obj-btn .en { font-size: 13px; font-weight: 500; color: #e8dcc8; }
    .obj-btn .ar { font-size: 12px; color: rgba(255,255,255,0.4); direction: rtl; margin-top: 2px; }

    #info-panel {
      margin-top: 4px;
      background: rgba(245,200,90,0.07);
      border: 1px solid rgba(245,200,90,0.2);
      border-radius: 8px;
      padding: 12px;
      display: none;
    }
    #info-panel .info-title { font-size: 13px; font-weight: 600; color: #F5C85A; margin-bottom: 4px; }
    #info-panel .info-ar { font-size: 12px; color: rgba(255,255,255,0.4); direction: rtl; margin-bottom: 8px; }
    #info-panel .info-desc { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.6; }

    #load-section { margin-top: auto; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    #load-section h2 { margin-bottom: 8px; }

    .load-btn {
      display: block;
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px dashed rgba(255,255,255,0.15);
      color: #c8b89a;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-bottom: 6px;
      transition: all 0.15s;
      text-align: left;
    }
    .load-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }
    #file-input { display: none; }

    #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    #canvas-wrap canvas { display: block; width: 100% !important; height: 100% !important; }

    #scene-label { position: absolute; top: 14px; left: 16px; pointer-events: none; }
    #scene-label .en { font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.85); }
    #scene-label .ar { font-size: 14px; color: rgba(255,255,255,0.4); direction: rtl; margin-top: 2px; }

    #controls-hint {
      position: absolute;
      bottom: 14px;
      right: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
      line-height: 1.7;
      text-align: right;
    }

    #status-bar {
      position: absolute;
      bottom: 14px;
      left: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #F5C85A;
    }

    #drop-hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      gap: 8px;
      opacity: 0.15;
    }
    #drop-hint .big { font-size: 48px; }
    #drop-hint .msg { font-size: 14px; color: #f0e6d0; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🕌 Qatar Heritage Viewer</h1>
  <button class="scene-btn active" data-scene="souq">Souq Waqif · سوق واقف</button>
  <button class="scene-btn" data-scene="corniche">Corniche · الكورنيش</button>
  <button class="scene-btn" data-scene="majlis">Majlis · المجلس</button>
</div>

<div id="main">
  <div id="sidebar">
    <h2>Scene Objects</h2>
    <div id="obj-list"></div>
    <div id="info-panel">
      <div class="info-title" id="info-title"></div>
      <div class="info-ar"    id="info-ar"></div>
      <div class="info-desc"  id="info-desc"></div>
    </div>
    <div id="load-section">
      <h2>Load GLB File</h2>
      <button class="load-btn" id="pick-btn">📂 Load GLB / GLTF file…</button>
      <input type="file" id="file-input" accept=".glb,.gltf" />
      <button class="load-btn" id="clear-btn">🗑 Clear loaded model</button>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="scene-label">
      <div class="en" id="label-en">Souq Waqif</div>
      <div class="ar" id="label-ar">سوق واقف</div>
    </div>
    <div id="drop-hint">
      <div class="big">📦</div>
      <div class="msg">Drop a .glb file here to load it</div>
    </div>
    <div id="loading-overlay">Loading model…</div>
    <div id="controls-hint">
      Left drag · Rotate<br>
      Right drag · Pan<br>
      Scroll · Zoom<br>
      Click · Select object
    </div>
    <div id="status-bar">Ready — load a GLB or click a scene object</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three":                  "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
    "three/addons/":          "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE                      from 'three';
import { OrbitControls }               from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }                  from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }                 from 'three/addons/loaders/DRACOLoader.js';

// ── Scene data ────────────────────────────────────────────────────────────────
const SCENES = {
  souq: {
    nameEn: 'Souq Waqif', nameAr: 'سوق واقف',
    sky: 0x1a0d04,
    fog: { color: 0x2a1608, density: 0.06 },
    ambient:    { color: 0xffe4b5, intensity: 0.5 },
    dir:        { color: 0xffd580, intensity: 1.0, pos: [5, 8, 4] },
    point:      { color: 0xff9933, intensity: 0.8, pos: [0, 3, 0] },
    groundColor: 0x7a5a32,
    objects: [
      { id:'stall',   nameEn:'Market Stall',     nameAr:'بسطة السوق',     desc:'Wooden souq stalls line the alleys of Waqif, selling spices, perfumes, and textiles since the 19th century.', color:0xC4882A, shape:'box',      pos:[-2.0,0.6, 0.0], scale:[1.2,1.2,0.7] },
      { id:'lantern', nameEn:'Brass Lantern',     nameAr:'فانوس نحاسي',   desc:'Hand-crafted brass lanterns illuminate the alleys after sunset — one of the most iconic images of Souq Waqif.',  color:0xE8A030, shape:'cylinder', pos:[ 0.3,1.2,-0.5], scale:[0.15,0.45,0.15] },
      { id:'spices',  nameEn:'Spice Jars',        nameAr:'أواني البهارات', desc:'Saffron, cardamom, frankincense — the aromas of spice stalls define the sensory experience of the souq.',        color:0xD4652A, shape:'box',      pos:[ 1.8,0.25,0.3], scale:[0.5,0.5,0.5] },
      { id:'arch',    nameEn:'Traditional Arch',  nameAr:'قوس تقليدي',    desc:'The mud-rendered arches follow Qatari vernacular architecture, lovingly restored to their original form in 2006.', color:0xB89060, shape:'box',      pos:[ 0.0,1.1,-1.6], scale:[3.0,0.25,0.2] },
    ]
  },
  corniche: {
    nameEn: 'The Corniche', nameAr: 'الكورنيش',
    sky: 0x04091a,
    fog: { color: 0x060d24, density: 0.05 },
    ambient:    { color: 0xaaccff, intensity: 0.4 },
    dir:        { color: 0xc8e0ff, intensity: 0.8, pos: [-4, 7, 2] },
    point:      { color: 0x3355ff, intensity: 0.5, pos: [0, 2, 0] },
    groundColor: 0x0a2040,
    objects: [
      { id:'dhow',   nameEn:'Traditional Dhow', nameAr:'السنبوك',     desc:'The dhow is the traditional wooden sailing vessel of the Arabian Gulf, once central to the Qatari pearl trade.',           color:0x8B6A3A, shape:'box',      pos:[-1.8,0.3, 0.2], scale:[2.0,0.4,0.6] },
      { id:'palm',   nameEn:'Date Palm',         nameAr:'نخلة التمر',  desc:"Qatar's national tree, featured on the coat of arms. Dates hold deep cultural and religious significance in the Gulf.",  color:0x2D7A1A, shape:'cylinder', pos:[ 1.6,0.8,-0.2], scale:[0.15,1.6,0.15] },
      { id:'tower',  nameEn:'Doha Skyline',      nameAr:'أفق الدوحة',  desc:'The Corniche skyline represents the rapid transformation of Doha from a pearl fishing village to a global city.',        color:0x3a5a8a, shape:'box',      pos:[ 0.2,1.0,-2.0], scale:[0.5,2.2,0.4] },
      { id:'falcon', nameEn:'Falcon',             nameAr:'الصقر',       desc:"Qatar's national symbol. Falconry is a Bedouin tradition spanning thousands of years, listed by UNESCO as heritage.",    color:0x8a7a60, shape:'box',      pos:[ 0.0,0.8, 0.9], scale:[0.3,0.5,0.25] },
    ]
  },
  majlis: {
    nameEn: 'Traditional Majlis', nameAr: 'المجلس التقليدي',
    sky: 0x100804,
    fog: { color: 0x1a0e06, density: 0.07 },
    ambient:    { color: 0xffe8c0, intensity: 0.55 },
    dir:        { color: 0xffcc66, intensity: 0.7,  pos: [3, 6, 2] },
    point:      { color: 0xff8822, intensity: 0.9,  pos: [0, 2.5, 0] },
    groundColor: 0x5a3318,
    objects: [
      { id:'dallah',  nameEn:'Dallah Coffee Pot', nameAr:'دلة القهوة',   desc:'Serving gahwa from a dallah is a sacred act of Qatari hospitality. Refusing the coffee offered is considered impolite.', color:0xC8A030, shape:'cylinder', pos:[ 0.4, 0.3, 0.6],  scale:[0.18,0.55,0.18] },
      { id:'cushion', nameEn:'Floor Cushion',      nameAr:'وسادة الأرض', desc:'Majlis seating is floor-level, lined with cushions along the walls. The circular arrangement symbolises equality.',        color:0x8B2020, shape:'box',      pos:[-1.6, 0.12, 0.0], scale:[0.9,0.22,0.65] },
      { id:'incense', nameEn:'Bakhoor Incense',    nameAr:'بخور',         desc:'Bakhoor is burned in a mabkhara and passed among guests — a traditional and aromatic gesture of welcome.',                 color:0x6B3A1F, shape:'box',      pos:[ 1.5, 0.2, 0.3],  scale:[0.3,0.35,0.3] },
      { id:'carpet',  nameEn:'Sadu Carpet',        nameAr:'بساط السدو',   desc:'Sadu weaving is traditional Bedouin textile art. Geometric patterns encode tribal identity, listed as UNESCO heritage.',   color:0x9A2C2C, shape:'box',      pos:[ 0.0, 0.04, 0.0], scale:[3.2,0.06,2.4] },
    ]
  }
};

// ── Three.js globals ──────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const wrap     = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.outputColorSpace  = THREE.SRGBColorSpace;

const scene  = new THREE.Scene();
const clock  = new THREE.Clock();
const camera = new THREE.PerspectiveCamera(55, 1, 0.05, 200);
camera.position.set(0, 2, 5);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping  = true;
controls.dampingFactor  = 0.08;
controls.target.set(0, 0.5, 0);
controls.minDistance    = 1;
controls.maxDistance    = 20;
controls.maxPolarAngle  = Math.PI * 0.88;
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near   = 0.5;
dirLight.shadow.camera.far    = 30;
dirLight.shadow.camera.left   = dirLight.shadow.camera.bottom = -6;
dirLight.shadow.camera.right  = dirLight.shadow.camera.top   =  6;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0xffffff, 0.6, 12);
scene.add(pointLight);

// Ground
const groundMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshStandardMaterial({ color: 0x5a3318, roughness: 0.95 })
);
groundMesh.rotation.x    = -Math.PI / 2;
groundMesh.receiveShadow  = true;
groundMesh.userData.isGround = true;
scene.add(groundMesh);

// GLTF Loader with optional Draco support
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

// State
let placeholders = [];
let loadedModel  = null;
let selectedMesh = null;
let currentKey   = 'souq';
const raycaster  = new THREE.Raycaster();
const mouse      = new THREE.Vector2();

// ── Resize ────────────────────────────────────────────────────────────────────
function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── Apply scene config ────────────────────────────────────────────────────────
function applyScene(key) {
  const d = SCENES[key];
  scene.background = new THREE.Color(d.sky);
  scene.fog        = new THREE.FogExp2(d.fog.color, d.fog.density);

  ambientLight.color.set(d.ambient.color);
  ambientLight.intensity = d.ambient.intensity;

  dirLight.color.set(d.dir.color);
  dirLight.intensity = d.dir.intensity;
  dirLight.position.set(...d.dir.pos);

  pointLight.color.set(d.point.color);
  pointLight.intensity = d.point.intensity;
  pointLight.position.set(...d.point.pos);

  groundMesh.material.color.set(d.groundColor);

  document.getElementById('label-en').textContent = d.nameEn;
  document.getElementById('label-ar').textContent = d.nameAr;
}

// ── Placeholder primitives ────────────────────────────────────────────────────
function buildPlaceholders(key) {
  placeholders.forEach(m => scene.remove(m));
  placeholders = [];

  SCENES[key].objects.forEach(od => {
    const geo = od.shape === 'cylinder'
      ? new THREE.CylinderGeometry(od.scale[0], od.scale[0] * 1.15, od.scale[1], 14)
      : new THREE.BoxGeometry(...od.scale);

    const mat  = new THREE.MeshStandardMaterial({ color: od.color, roughness: 0.75, metalness: 0.1 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(...od.pos);
    mesh.castShadow    = true;
    mesh.receiveShadow = true;
    mesh.userData      = { ...od };
    scene.add(mesh);
    placeholders.push(mesh);
  });

  setStatus(`${SCENES[key].objects.length} placeholder objects · load a GLB to replace them`);
}

// ── Sidebar object list ───────────────────────────────────────────────────────
function buildObjList(key) {
  const list = document.getElementById('obj-list');
  list.innerHTML = '';
  SCENES[key].objects.forEach(od => {
    const btn = document.createElement('button');
    btn.className = 'obj-btn';
    btn.id        = 'btn-' + od.id;
    btn.innerHTML = `<div class="en">${od.nameEn}</div><div class="ar">${od.nameAr}</div>`;
    btn.addEventListener('click', () => {
      const mesh = placeholders.find(m => m.userData.id === od.id);
      if (!mesh) return;
      deselect();
      select(mesh);
      const box    = new THREE.Box3().setFromObject(mesh);
      controls.target.copy(box.getCenter(new THREE.Vector3()));
      controls.update();
    });
    list.appendChild(btn);
  });
}

// ── Scene switching ───────────────────────────────────────────────────────────
function switchScene(key) {
  currentKey = key;
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.toggle('active', b.dataset.scene === key));
  applyScene(key);
  buildPlaceholders(key);
  buildObjList(key);
  deselect();
}

// ── Click / selection ─────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const targets = [...placeholders];
  if (loadedModel) loadedModel.traverse(c => { if (c.isMesh) targets.push(c); });

  const hits = raycaster.intersectObjects(targets, true);
  if (hits.length && !hits[0].object.userData.isGround) {
    select(hits[0].object);
  } else {
    deselect();
  }
});

function select(mesh) {
  if (selectedMesh) resetColor(selectedMesh);
  selectedMesh = mesh;

  // Store original color and highlight gold
  if (mesh.material && mesh.material.color) {
    if (mesh.userData._origColor === undefined)
      mesh.userData._origColor = mesh.material.color.getHex();
    mesh.material.color.set(0xF5C85A);
  }

  // Show info panel
  const ud = mesh.userData;
  if (ud.nameEn) {
    showInfo(ud.nameEn, ud.nameAr || '', ud.desc || '');
    document.querySelectorAll('.obj-btn').forEach(b => b.classList.remove('selected'));
    const btn = document.getElementById('btn-' + ud.id);
    if (btn) btn.classList.add('selected');
  } else {
    showInfo('GLB Model', '', 'Loaded 3D model. Wire this click to a Fanar API call to generate cultural context.');
  }
}

function deselect() {
  if (selectedMesh) resetColor(selectedMesh);
  selectedMesh = null;
  document.getElementById('info-panel').style.display = 'none';
  document.querySelectorAll('.obj-btn').forEach(b => b.classList.remove('selected'));
}

function resetColor(mesh) {
  if (mesh.material && mesh.material.color && mesh.userData._origColor !== undefined) {
    mesh.material.color.set(mesh.userData._origColor);
  }
}

function showInfo(en, ar, desc) {
  document.getElementById('info-title').textContent = en;
  document.getElementById('info-ar').textContent    = ar;
  document.getElementById('info-desc').textContent  = desc;
  document.getElementById('info-panel').style.display = 'block';
}

// ── GLB loading ───────────────────────────────────────────────────────────────
function loadFile(file) {
  if (!file) return;
  showLoading(true);
  const url = URL.createObjectURL(file);

  gltfLoader.load(
    url,
    gltf => {
      if (loadedModel) scene.remove(loadedModel);
      const model = gltf.scene;

      // Auto-scale to fit ~3 units
      const box    = new THREE.Box3().setFromObject(model);
      const size   = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      model.scale.setScalar(3.0 / maxDim);

      // Seat on ground
      const box2 = new THREE.Box3().setFromObject(model);
      const ctr  = box2.getCenter(new THREE.Vector3());
      model.position.x -= ctr.x;
      model.position.z -= ctr.z;
      model.position.y -= box2.min.y;

      model.traverse(child => {
        if (child.isMesh) {
          child.castShadow    = true;
          child.receiveShadow = true;
        }
      });

      scene.add(model);
      loadedModel = model;

      // Frame camera
      const box3  = new THREE.Box3().setFromObject(model);
      const ctr3  = box3.getCenter(new THREE.Vector3());
      const size3 = box3.getSize(new THREE.Vector3());
      const dist  = Math.max(size3.x, size3.y, size3.z) * 2;
      controls.target.copy(ctr3);
      camera.position.set(ctr3.x + dist, ctr3.y + dist * 0.6, ctr3.z + dist);
      controls.update();

      URL.revokeObjectURL(url);
      showLoading(false);
      document.getElementById('drop-hint').style.display = 'none';
      setStatus(`Loaded: ${file.name}  (${(file.size / 1024).toFixed(0)} KB)`);
    },
    xhr => {
      if (xhr.total) setStatus(`Loading… ${Math.round(xhr.loaded / xhr.total * 100)}%`);
    },
    err => {
      showLoading(false);
      setStatus(`Error: ${err.message}`);
      console.error(err);
    }
  );
}

// File picker
document.getElementById('pick-btn').addEventListener('click', () =>
  document.getElementById('file-input').click()
);
document.getElementById('file-input').addEventListener('change', e => loadFile(e.target.files[0]));

// Clear button
document.getElementById('clear-btn').addEventListener('click', () => {
  if (loadedModel) { scene.remove(loadedModel); loadedModel = null; }
  document.getElementById('drop-hint').style.display = 'flex';
  setStatus('Model cleared');
  deselect();
});

// Drag and drop
wrap.addEventListener('dragover', e => e.preventDefault());
wrap.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && (file.name.endsWith('.glb') || file.name.endsWith('.gltf'))) loadFile(file);
});

// Scene buttons
document.querySelectorAll('.scene-btn').forEach(btn =>
  btn.addEventListener('click', () => switchScene(btn.dataset.scene))
);

// ── Helpers ───────────────────────────────────────────────────────────────────
function showLoading(v) {
  document.getElementById('loading-overlay').style.display = v ? 'flex' : 'none';
}
function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ── Animation loop ────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();

  const lantern = placeholders.find(m => m.userData.id === 'lantern');
  if (lantern) lantern.position.y = lantern.userData.pos[1] + Math.sin(t * 0.9) * 0.04;

  const falcon = placeholders.find(m => m.userData.id === 'falcon');
  if (falcon) falcon.rotation.y = Math.sin(t * 0.5) * 0.25;

  const baseIntensity = SCENES[currentKey]?.point.intensity ?? 0.8;
  pointLight.intensity = baseIntensity * (0.92 + 0.08 * Math.sin(t * 2.1));

  renderer.render(scene, camera);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
applyScene('souq');
buildPlaceholders('souq');
buildObjList('souq');
animate();
</script>
